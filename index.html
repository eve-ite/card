<!DOCTYPE html>
<html>
    <head>
        <title>Happy 28th!!</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="game">
            <div class="viewport">
                <div id="room" class="scene active">
                    <img src="images/room.png" class="background">
                    <img src="images/table-object.png" class="object table-object">
                </div>

                <div id="table" class="scene">
                    <img src="images/table.png" class="background">
                    <img src="images/box.png" class="object box">
                </div>

                <div id="table-blurry" class="scene">
                    <img src="images/table-blurry.png" class="background">
                    <img src="images/usb.png" class="object usb">
                </div>

                <div id="black" class="scene black">
                </div>

                <div id="laptop-off" class="scene">
                    <img src="images/laptop-off.png" class="background">
                    <img src="images/dock.png" class="object dock">
                </div>

                <div id="laptop-loading" class="scene">
                    <img src="images/laptop-loading.png" class="background">
                </div>

                <div id="terminal" class="scene black">
                    <div class="terminal-output hide-scrollbar"></div>
                </div>
            </div>
        </div>
    <script src="script.js"></script>
    </body>
</html>
